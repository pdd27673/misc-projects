name: Type Check

on:
  push:
    branches: [gametime-grid-sports-epg]
  pull_request:
    branches: [gametime-grid-sports-epg]

jobs:
  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm install
      - run: npx tsc --noEmit
